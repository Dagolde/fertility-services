name: fertility_services_app
description: A comprehensive fertility services mobile application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  
  # State Management
  provider: ^6.1.2
  flutter_bloc: ^8.1.6
  
  # Navigation
  go_router: ^14.6.2
  
  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Authentication
  flutter_secure_storage: ^9.2.2
  
  # Forms & Validation
  flutter_form_builder: ^9.4.1
  form_builder_validators: ^10.0.1
  
  # Date & Time
  intl: ^0.19.0
  timezone: ^0.9.4
  
  # Location Services
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  
  # Push Notifications (Local only)
  flutter_local_notifications: ^17.2.3
  
  # Real-time Communication
  web_socket_channel: ^3.0.1
  
  # File Handling
  file_picker: ^8.1.4
  path_provider: ^2.1.5
  
  # UI Enhancements
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0
  lottie: ^3.2.0
  
  # Utils
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  
  # Charts and Data Visualization
  fl_chart: ^0.69.0
  
  # Calendar
  table_calendar: ^3.1.2
  
  # Image Processing
  image: ^4.2.0
  
  # Video Player
  video_player: ^2.9.2
  
  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  retrofit_generator: ^8.2.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700

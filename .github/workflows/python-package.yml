# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
      with:
        clean: true
        fetch-depth: 0
    - name: Clear Python cache
      run: |
        find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
        find . -type f -name "*.pyc" -delete 2>/dev/null || true
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Verify test files removed
      run: |
        echo "Checking if test files exist:"
        ls -la test_*.py 2>/dev/null || echo "No test files in root - Good!"
        ls -la python_backend/test_*.py 2>/dev/null || echo "No test files in python_backend - Good!"
    - name: Verify file integrity
      run: |
        echo "Checking enhanced_main.py line count:"
        wc -l admin_dashboard/enhanced_main.py
        echo "Checking for toggle_hospital_verification function:"
        grep -n "def toggle_hospital_verification" admin_dashboard/enhanced_main.py || echo "Function not found!"
        echo "Checking for show_manage_doctors function:"
        grep -n "def show_manage_doctors" admin_dashboard/enhanced_main_complete.py || echo "Function not found!"
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
